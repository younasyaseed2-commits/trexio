{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Trexio Admin | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f3171; display: flex; align-items: center; height: 100vh; font-family: sans-serif; }
        .login-card { width: 400px; margin: auto; border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .bg-trexio { background-color: #0f3171 !important; color: white; }
    </style>
</head>
<body>
    <div class="card login-card p-4">
        <div class="text-center mb-4">
            <img src="{% static 'store/logo.PNG' %}" height="50">
            <h4 class="mt-3 fw-bold text-trexio">Staff Control Center</h4>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2 small">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold">Username</label>
                {{ form.username }}
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Password</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn bg-trexio w-100 py-2 fw-bold">Authorize Entry</button>
        </form>
        <div class="text-center mt-3">
            <a href="{% url 'home' %}" class="text-decoration-none small text-muted">← Back to Store</a>
        </div>
    </div>
</body>
</html>
